- name: update homebrew itself
  homebrew:
    update_homebrew: true

- name: install brew packages
  homebrew:
    state: latest
    name:
      - ansible
      - aqua
      - fish
      - git
      - imagemagick
      - libpq
      - make
      - mas
      - mtr
      - mysql-client
      - rust
      - tig
      - tmux
      - wget

- name: link brew packages
  homebrew:
    state: linked
    install_options:
      - force
    name:
      - libpq
      - mysql-client
