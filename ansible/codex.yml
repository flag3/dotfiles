- name: ensure ~/.codex directory exists
  file:
    path: "{{ ansible_facts['env']['HOME'] }}/.codex"
    state: directory
  tags: codex

- name: copy codex config.toml from ECC repo if not present
  copy:
    src: "{{ ansible_facts['env']['HOME'] }}/.ghq/github.com/affaan-m/everything-claude-code/.codex/config.toml"
    dest: "{{ ansible_facts['env']['HOME'] }}/.codex/config.toml"
    force: false
  tags: codex

- name: install npm dependencies for everything-claude-code
  shell: npm install
  args:
    chdir: "{{ ansible_facts['env']['HOME'] }}/.ghq/github.com/affaan-m/everything-claude-code"
  tags: codex

- name: sync ECC assets to codex
  shell: bash scripts/sync-ecc-to-codex.sh
  args:
    chdir: "{{ ansible_facts['env']['HOME'] }}/.ghq/github.com/affaan-m/everything-claude-code"
  tags: codex

- name: set core.hooksPath without absolute path expansion
  shell: git config --global core.hooksPath '~/.codex/git-hooks'
  tags: codex
